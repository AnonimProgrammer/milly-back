name: Integration tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  itest:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Testcontainers
        uses: actions/cache@v6
        with:
          path: ~/.testcontainers
          key: testcontainers-${{ runner.os }}-${{ hashFiles('gradle/milly-back.itest.gradle', 'build.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            testcontainers-${{ runner.os }}-

      - name: Cache Docker image (postgres:16-alpine)
        uses: actions/cache@v6
        id: docker-cache
        with:
          path: /tmp/docker-postgres.tar
          key: docker-postgres-16-alpine-${{ runner.os }}-${{ hashFiles('gradle/milly-back.itest.gradle') }}
          restore-keys: |
            docker-postgres-16-alpine-${{ runner.os }}-

      - name: Load Docker image from cache
        if: steps.docker-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/docker-postgres.tar

      - name: Pull and save Docker image
        if: steps.docker-cache.outputs.cache-hit != 'true'
        run: |
          docker pull postgres:16-alpine
          docker save postgres:16-alpine -o /tmp/docker-postgres.tar

      - name: Run integration tests
        env:
          CI: true
        run: ./gradlew itest --no-daemon
