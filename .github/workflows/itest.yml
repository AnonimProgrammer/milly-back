name: Integration tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  itest:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Testcontainers
        uses: actions/cache@v6
        with:
          path: ~/.testcontainers
          key: testcontainers-${{ runner.os }}-${{ hashFiles('gradle/milly-back.itest.gradle', 'build.gradle', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            testcontainers-${{ runner.os }}-

      - name: Run integration tests
        env:
          CI: true
        run: ./gradlew itest --no-daemon
