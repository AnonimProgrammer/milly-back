spring.application.name=milly-back
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info

auth.jwt.secret=${JWT_SECRET:dev-jwt-secret-with-at-least-sixty-four-characters-for-hmac-signing}
auth.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}
auth.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:1209600}
auth.google.client-id=${GOOGLE_CLIENT_ID:}
auth.apple.client-id=${APPLE_CLIENT_ID:}
auth.cookies.secure=${AUTH_COOKIES_SECURE:false}

# Caffeine fallback when a cache spec omits maximum size
cache.caffeine.default-maximum-size=${CACHE_DEFAULT_MAXIMUM_SIZE:10000}

client.url=${CLIENT_URL:http://localhost:3000}
