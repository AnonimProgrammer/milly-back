spring.application.name=milly-back
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info

auth.jwt.secret=${JWT_SECRET:dev-jwt-secret-with-at-least-sixty-four-characters-for-hmac-signing}
auth.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}
auth.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:1209600}
auth.google.client-id=${GOOGLE_CLIENT_ID:}
auth.apple.client-id=${APPLE_CLIENT_ID:}
auth.cookies.secure=${AUTH_COOKIES_SECURE:false}
auth.ws-ticket.ttl-seconds=${WS_TICKET_TTL_SECONDS:30}

# Caffeine fallback when a cache spec omits maximum size
cache.caffeine.default-maximum-size=${CACHE_DEFAULT_MAXIMUM_SIZE:10000}

# How long a completed idempotent response is replayable for a given Idempotency-Key
idempotency.ttl-seconds=${IDEMPOTENCY_TTL_SECONDS:86400}

# Accept lowercase enum values (e.g. billing "provider": "card") without a custom deserializer
spring.jackson.mapper.accept-case-insensitive-enums=true

client.url=${CLIENT_URL:http://localhost:3000}

venue.invitation.ttl-seconds=${VENUE_INVITATION_TTL_SECONDS:86400}

storage.s3.bucket=${S3_BUCKET:}
storage.s3.region=${S3_REGION:eu-west-1}
storage.s3.access-key-id=${AWS_ACCESS_KEY_ID:}
storage.s3.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
storage.s3.public-base-url=${S3_PUBLIC_BASE_URL:}
